<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    .logo-badge {
      background: #6366f1;
      padding: 5px;
      border-radius: 6px;
      color: white;
    }
    h2 { font-size: 1rem; margin: 0; }
    textarea {
      width: 100%;
      height: 120px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px;
      box-sizing: border-box;
      font-size: 0.9rem;
      resize: none;
      margin-bottom: 10px;
    }
    .btn {
      width: 100%;
      background: #6366f1;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:disabled { background: #94a3b8; }
    #result {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }
    .scam { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
    .safe { background: #d1fae5; color: #047857; border: 1px solid #a7f3d0; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-badge">🛡️</div>
    <h2>CyberShield Protector</h2>
  </div>
  <textarea id="inputText" placeholder="Paste message or text to analyze..."></textarea>
  <button id="scanBtn" class="btn">Analyze Text</button>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
