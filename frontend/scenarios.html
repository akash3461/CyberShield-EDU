<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Scenarios - CyberShield EDU</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .scenario-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 3rem;
            max-width: 800px;
            margin: 40px auto;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        .scenario-text {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }
        .option-tray {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .option-btn {
            background: rgba(var(--primary-rgb), 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 1.25rem;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            position: relative;
        }
        .option-btn:hover {
            background: var(--primary-glow);
            border-color: var(--secondary);
            transform: translateX(10px);
        }
        .feedback {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 1rem;
            display: none;
        }
        .feedback.correct { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--success); color: var(--success); }
        .feedback.wrong { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>

    <header>
        <a href="index.html" class="logo">
            <div class="logo-badge">
                <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12.75 11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 0 1-1.043 3.296 3.745 3.745 0 0 1-3.296 1.043A3.745 3.745 0 0 1 12 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 0 1-3.296-1.043 3.745 3.745 0 0 1-1.043-3.296A3.745 3.745 0 0 1 3 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 0 1 1.043-3.296 3.746 3.746 0 0 1 3.296-1.043A3.746 3.746 0 0 1 12 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 0 1 3.296 1.043 3.746 3.746 0 0 1 1.043 3.296A3.745 3.745 0 0 1 21 12Z" />
                </svg>
            </div>
            <span>CyberShield</span>
        </a>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="detector.html">Detector</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="history.html">My Scans</a></li>
                <li><a href="quiz.html">Scam Quiz</a></li>
                <li><a href="admin.html">Admin</a></li>
            </ul>
        </nav>

        <div class="nav-actions">
            <!-- Gamified Stats -->
            <div class="user-stats-badge">
                <div class="level-indicator" data-gamif="level">1</div>
                <div class="stat-group">
                    <span class="stat-label" data-gamif="title">Initiate</span>
                    <span class="stat-value"><span data-gamif="xp">0</span> XP</span>
                    <div class="xp-progress-mini">
                        <div class="xp-fill" data-gamif="progress" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
            
            <!-- Theme Toggle -->
            <div class="theme-switch" onclick="toggleTheme()" title="Toggle Light/Dark Mode">
                <div class="slider">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
                    </svg>
                </div>
            </div>

            <div id="auth-buttons" class="auth-ui">
                <a href="login.html" class="btn btn-ghost">Login</a>
                <a href="signup.html" class="btn btn-primary">Sign Up</a>
            </div>
            <div id="user-profile" class="auth-ui" style="display: none;">
                <div class="user-info-pill">
                    <span id="header-username" class="username-text">User</span>
                    <button onclick="logout()" class="logout-mini-btn" title="Logout">
                        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                    </button>
                </div>
            </div>

            <button class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>


    <main class="container">
        <section style="padding: 4rem 0;">
            <div id="scenario-stage">
                <!-- Injected via JS -->
            </div>
        </section>
    </main>

    <script src="js/gamification.js"></script>
    <script>
        const SCENARIOS = [
            {
                id: 1,
                text: "You receive a DM on Discord from your Computer Science teacher. They say they've lost access to their grade-book and need you to send them your login credentials 'just for a second' to verify something. What do you do?",
                options: [
                    { text: "Help them out! It's your teacher and they sound stressed.", correct: false, feedback: "🚨 WRONG: Teachers will NEVER ask for your password. This is a common impersonation scam." },
                    { text: "Politely decline and report the message to the school IT department.", correct: true, feedback: "✅ CORRECT: Reporting is the best way to stop impersonators!" }
                ]
            }
            // More scenarios can be added here
        ];

        let currentScenario = 0;

        function renderScenario() {
            const stage = document.getElementById('scenario-stage');
            const scene = SCENARIOS[currentScenario];
            
            stage.innerHTML = `
                <div class="scenario-card">
                    <div class="badge" style="margin-bottom: 20px;">SCENARIO ${scene.id}</div>
                    <div class="scenario-text">${scene.text}</div>
                    <div class="option-tray">
                        ${scene.options.map((opt, idx) => `
                            <button class="option-btn" onclick="handleOption(${idx})">${opt.text}</button>
                        `).join('')}
                    </div>
                    <div id="feedback-box" class="feedback"></div>
                    <button id="next-btn" class="btn btn-primary" style="margin-top: 20px; display: none;" onclick="nextScenario()">Next Scenario</button>
                </div>
            `;
        }

        function handleOption(idx) {
            const scene = SCENARIOS[currentScenario];
            const opt = scene.options[idx];
            const feedback = document.getElementById('feedback-box');
            
            feedback.innerHTML = opt.feedback;
            feedback.style.display = 'block';
            feedback.className = `feedback ${opt.correct ? 'correct' : 'wrong'}`;
            
            if (opt.correct) {
                if (window.Gamification) window.Gamification.addXp(40, "Completed Scenario");
            }

            document.getElementById('next-btn').style.display = 'block';
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true);
        }

        function nextScenario() {
            alert("This was the end of the demo scenarios. More coming soon!");
            window.location.href = "education.html";
        }

        renderScenario();
    </script>
</body>
</html>
