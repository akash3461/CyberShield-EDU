<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CyberShield EDU</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <a href="index.html" class="back-nav">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        <span>Back to Home</span>
    </a>



    <main class="container" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 0;">
        <div class="glass-card" style="width: 100%; max-width: 450px; padding: 40px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="font-size: 2rem; margin-bottom: 10px; background: var(--hero-gradient); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Welcome Back</h1>
                <p style="color: var(--text-muted);">Secure your journey with CyberShield EDU</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 500;">Username</label>
                    <input type="text" id="username" required placeholder="Enter your username">
                </div>
                <div class="input-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 500;">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <div id="error-message" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 15px; display: none;"></div>
                <button type="submit" id="btn-login" class="btn-primary" style="width: 100%; margin-top: 10px;">
                    Login
                </button>
            </form>

            <div style="text-align: center; margin-top: 25px; color: var(--text-muted); font-size: 0.9rem;">
                Don't have an account? <a href="signup.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign Up</a>
            </div>
        </div>
    </main>

    <footer class="footer" style="border-top:1px solid var(--glass-border);padding:2rem 0;"><div class="container" style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1rem;"><p style="margin:0;">&copy; 2026 CyberShield EDU. Stay Safe, Stay Informed.</p><div style="display:flex;gap:1.5rem;"><a href="about.html" style="color:var(--text-secondary);text-decoration:none;font-size:0.9rem;">About</a><a href="terms.html" style="color:var(--text-secondary);text-decoration:none;font-size:0.9rem;">Terms</a><a href="developer.html" style="color:var(--text-secondary);text-decoration:none;font-size:0.9rem;">API</a></div></div></footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const errorEl = document.getElementById('error-message');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'Logging in...';
            errorEl.style.display = 'none';

            try {
                await window.api.auth.login(username, password);
                // Reset guest scans on login
                localStorage.removeItem('cs_guest_scans');
                window.location.href = 'index.html';
            } catch (err) {
                errorEl.textContent = err.message || 'Login failed. Please check your credentials.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
