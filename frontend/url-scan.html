<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield EDU - URL Scan</title>
    <!-- Google Fonts for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <header>
        <a href="index.html" class="logo">
            <div class="logo-badge">
                <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12.75 11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 0 1-1.043 3.296 3.745 3.745 0 0 1-3.296 1.043A3.745 3.745 0 0 1 12 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 0 1-3.296-1.043 3.745 3.745 0 0 1-1.043-3.296A3.745 3.745 0 0 1 3 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 0 1 1.043-3.296 3.746 3.746 0 0 1 3.296-1.043A3.746 3.746 0 0 1 12 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 0 1 3.296 1.043 3.746 3.746 0 0 1 1.043 3.296A3.745 3.745 0 0 1 21 12Z" />
                </svg>
            </div>
            <span>CyberShield</span>
        </a>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="detector.html" class="active">Detector</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="history.html">My Scans</a></li>
                <li><a href="quiz.html">Scam Quiz</a></li>
                <li><a href="admin.html">Admin</a></li>
            </ul>
        </nav>

        <div class="nav-actions">
            <!-- Gamified Stats -->
            <div class="user-stats-badge">
                <div class="level-indicator" data-gamif="level">1</div>
                <div class="stat-group">
                    <span class="stat-label" data-gamif="title">Initiate</span>
                    <span class="stat-value"><span data-gamif="xp">0</span> XP</span>
                    <div class="xp-progress-mini">
                        <div class="xp-fill" data-gamif="progress" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
            
            <!-- Theme Toggle -->
            <div class="theme-switch" onclick="toggleTheme()" title="Toggle Light/Dark Mode">
                <div class="slider">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
                    </svg>
                </div>
            </div>

            <div id="auth-buttons" class="auth-ui">
                <a href="login.html" class="btn btn-ghost">Login</a>
                <a href="signup.html" class="btn btn-primary">Sign Up</a>
            </div>
            <div id="user-profile" class="auth-ui" style="display: none;">
                <div class="user-info-pill">
                    <span id="header-username" class="username-text">User</span>
                    <button onclick="logout()" class="logout-mini-btn" title="Logout">
                        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                    </button>
                </div>
            </div>

            <button class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="container" style="padding-top: 100px;">
        <div class="content-wrapper">

            <!-- URL Scan View -->
            <div id="url-scan-view" class="view-section active">
                <div class="glass-card">
                    <div class="card-header">
                        <div class="card-icon-wrapper">
                            <svg class="card-icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M13.19 8.688a4.5 4.5 0 0 1 1.242 7.244l-4.5 4.5a4.5 4.5 0 0 1-6.364-6.364l1.757-1.757m13.35-.622 1.757-1.757a4.5 4.5 0 0 0-6.364-6.364l-4.5 4.5a4.5 4.5 0 0 0 1.242 7.244" />
                            </svg>
                        </div>
                        <div class="card-title-content">
                            <h2>URL Risk Analyzer</h2>
                            <p>Verify the safety of links before clicking.</p>
                        </div>
                    </div>

                    <div class="card-body">
                        <div class="input-glow-wrapper" style="margin-bottom: 24px;">
                            <!-- Standard inline styling mixed with class to ensure it looks just like text scan -->
                            <input type="url" id="urlScanInput" placeholder="http://example.com/login"
                                style="width: 100%; padding: 1.25rem; font-size: 1rem; color: var(--text-main); background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 0.75rem; outline: none; transition: all 0.2s;"
                                onfocus="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 0 0 2px var(--primary-glow)';"
                                onblur="this.style.borderColor='var(--input-border)'; this.style.boxShadow='none';">
                        </div>

                        <button id="btn-url-scan" class="btn-primary" style="width: 100%;">
                            <span class="btn-text">Run AI Analysis</span>
                            <div class="btn-loader hidden">
                                <span class="pulse-text">ANALYZING URL</span>
                                <div class="loader-bars">
                                    <div class="bar bar-1"></div>
                                    <div class="bar bar-2"></div>
                                    <div class="bar bar-3"></div>
                                </div>
                            </div>
                        </button>
                    </div>
                </div>

                <!-- Result Container (Hidden by default) -->
                <div id="result-container" class="result-container hidden">
                    <!-- Filled by JS -->
                </div>
            </div>

        </div>
    </main>

    <!-- Application Logic -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
