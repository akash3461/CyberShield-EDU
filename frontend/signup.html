<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CyberShield EDU</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <a href="index.html" class="back-nav">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        <span>Back to Home</span>
    </a>



    <main class="container" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 0;">
        <div class="glass-card" style="width: 100%; max-width: 450px; padding: 40px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="font-size: 2rem; margin-bottom: 10px; background: var(--hero-gradient); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Create Account</h1>
                <p style="color: var(--text-muted);">Join the CyberShield EDU community</p>
            </div>

            <form id="signupForm">
                <div class="input-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 500;">Username</label>
                    <input type="text" id="reg-username" required placeholder="Pick a unique username">
                </div>
                <div class="input-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 500;">Email Address</label>
                    <input type="email" id="reg-email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 500;">Password</label>
                    <input type="password" id="reg-password" required placeholder="Create a strong password">
                </div>
                <div id="error-message" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 15px; display: none;"></div>
                <div id="success-message" style="color: var(--success); font-size: 0.85rem; margin-bottom: 15px; display: none;">Registration successful! Redirecting...</div>
                <button type="submit" id="btn-signup" class="btn-primary" style="width: 100%; margin-top: 10px;">
                    Sign Up
                </button>
            </form>

            <div style="text-align: center; margin-top: 25px; color: var(--text-muted); font-size: 0.9rem;">
                Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login</a>
            </div>
        </div>
    </main>

    <footer class="footer" style="border-top:1px solid var(--glass-border);padding:2rem 0;"><div class="container" style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1rem;"><p style="margin:0;">&copy; 2026 CyberShield EDU. Stay Safe, Stay Informed.</p><div style="display:flex;gap:1.5rem;"><a href="about.html" style="color:var(--text-secondary);text-decoration:none;font-size:0.9rem;">About</a><a href="terms.html" style="color:var(--text-secondary);text-decoration:none;font-size:0.9rem;">Terms</a><a href="developer.html" style="color:var(--text-secondary);text-decoration:none;font-size:0.9rem;">API</a></div></div></footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-signup');
            const errorEl = document.getElementById('error-message');
            const successEl = document.getElementById('success-message');
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            btn.disabled = true;
            btn.textContent = 'Creating account...';
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            try {
                await window.api.auth.register(username, email, password);
                successEl.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                errorEl.textContent = err.message || 'Registration failed.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign Up';
            }
        });
    </script>
</body>
</html>
