<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scam or Safe? - CyberShield EDU</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/gamification.css">
    <style>
        .quiz-container {
            max-width: 700px;
            margin: 0 auto;
            perspective: 1000px;
        }

        .quiz-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .quiz-content {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.6;
            margin-bottom: 2rem;
            font-family: 'Courier New', Courier, monospace;
            background: var(--glass-bg);
            padding: 1.5rem;
            border-radius: 0.75rem;
            width: 100%;
        }

        .quiz-actions {
            display: flex;
            gap: 1.5rem;
            width: 100%;
        }

        .btn-quiz {
            flex: 1;
            padding: 1.25rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 1.125rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-trust {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border-color: rgba(16, 185, 129, 0.3);
        }

        .btn-trust:hover {
            background: #10b981;
            color: white; 
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .btn-scam {
            background: rgba(244, 63, 94, 0.1);
            color: #fb7185;
            border-color: rgba(244, 63, 94, 0.3);
        }

        .btn-scam:hover {
            background: #f43f5e;
            color: white;
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.4);
        }

        .feedback-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2.5rem;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .feedback-correct {
            background: rgba(6, 78, 59, 0.9);
            color: #ecfdf5;
        }

        .feedback-wrong {
            background: rgba(153, 27, 27, 0.9);
            color: #fef2f2;
        }

        .feedback-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .feedback-text {
            font-size: 1.125rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: var(--glass-bg);
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--glass-border);
        }

        .progress-dots {
            display: flex;
            gap: 0.5rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--glass-border);
        }

        .dot.active { background: #6366f1; }
        .dot.correct { background: #10b981; }
        .dot.wrong { background: #f43f5e; }
    </style>
</head>

<body>
    <header>
        <a href="index.html" class="logo">
            <div class="logo-badge">
                <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12.75 11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 0 1-1.043 3.296 3.745 3.745 0 0 1-3.296 1.043A3.745 3.745 0 0 1 12 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 0 1-3.296-1.043 3.745 3.745 0 0 1-1.043-3.296A3.745 3.745 0 0 1 3 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 0 1 1.043-3.296 3.746 3.746 0 0 1 3.296-1.043A3.746 3.746 0 0 1 12 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 0 1 3.296 1.043 3.746 3.746 0 0 1 1.043 3.296A3.745 3.745 0 0 1 21 12Z" />
                </svg>
            </div>
            <span>CyberShield</span>
        </a>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="detector.html">Detector</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="history.html">My Scans</a></li>
                <li><a href="quiz.html" class="active">Scam Quiz</a></li>
                <li><a href="admin.html" id="admin-nav">Admin</a></li>
            </ul>
        </nav>

        <div class="nav-actions">
            <!-- Theme Toggle -->
            <div class="theme-switch" onclick="toggleTheme()" title="Toggle Light/Dark Mode">
                <div class="slider">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
                    </svg>
                </div>
            </div>

            <div id="auth-buttons" class="auth-ui">
                <a href="login.html" class="btn btn-ghost">Login</a>
                <a href="signup.html" class="btn btn-primary">Sign Up</a>
            </div>

            <div id="user-profile" class="auth-ui" style="display: none;">
                <div class="user-command-center">
                    <div class="user-stats-brief">
                        <div class="level-circle" data-gamif="level">1</div>
                        <div class="user-meta">
                            <span id="header-username" class="username-text">User</span>
                            <span class="xp-count"><span data-gamif="xp">0</span> XP</span>
                        </div>
                    </div>
                    <button onclick="logout()" class="logout-mini-btn" title="Logout">
                        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                    </button>
                </div>
            </div>

            <button class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="container" style="padding-top: 100px;">
        <div class="content-wrapper">
                <div class="quiz-container">
                    <div class="score-bar">
                        <div style="color: #94a3b8; font-weight: 600;">Question <span id="currentIdx">1</span>/5</div>
                        <div class="progress-dots" id="dots">
                            <div class="dot active"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                        <div id="scoreDisplay" style="color: #6366f1; font-weight: 700;">Score: 0</div>
                    </div>

                    <div class="quiz-card" id="quizCard">
                        <div class="quiz-content" id="questionContent">
                            Loading your first challenge...
                        </div>
                        <div class="quiz-actions" id="quizActions">
                            <button class="btn-quiz btn-trust" onclick="handleChoice(false)">It's Safe</button>
                            <button class="btn-quiz btn-scam" onclick="handleChoice(true)">It's a Scam</button>
                        </div>

                        <div id="feedback" class="feedback-overlay">
                            <div class="feedback-icon" id="feedbackIcon">✅</div>
                            <h2 style="margin-bottom: 1rem;" id="feedbackTitle">Correct!</h2>
                            <p class="feedback-text" id="explanationText">Explanation goes here...</p>
                            <button class="btn-primary" onclick="nextQuestion()" style="padding: 0.75rem 2rem;">Next Challenge</button>
                        </div>
                    </div>
                    
                    <div id="finalScore" style="display:none; text-align: center;" class="glass-card">
                        <div class="feedback-icon" style="font-size: 5rem; margin-bottom: 1rem;">🏆</div>
                        <h1 style="color: var(--text-main); margin-bottom: 0.5rem;">Quiz Complete!</h1>
                        <p style="color: var(--text-muted); font-size: 1.25rem; margin-bottom: 2rem;">You identified <span id="finalScoreVal">0</span> out of 5 cyber threats correctly.</p>
                        <div style="display: flex; gap: 1rem; justify-content: center;">
                            <button class="btn-primary" onclick="location.reload()" style="padding: 1rem 2rem;">Try Again</button>
                            <button class="btn-ghost" onclick="shareResults()" style="padding: 1rem 2rem; border: 1px solid var(--glass-border);">
                                <svg style="width: 1.25rem; vertical-align: middle; margin-right: 8px;" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M7.217 10.907a2.25 2.25 0 1 0 0 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186 9.566-5.314m-9.566 7.5 9.566 5.314m0 0a2.25 2.25 0 1 0 3.935 2.186 2.25 2.25 0 0 0-3.935-2.186Zm0-12.814a2.25 2.25 0 1 0 3.933-2.185 2.25 2.25 0 0 0-3.933 2.185Z" /></svg>
                                Share Result
                            </button>
                        </div>
                    </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/gamification.js"></script>
    <script src="js/app.js"></script>
    <script>
        let questions = [];
        let currentIdx = 0;
        let score = 0;

        async function initQuiz() {
            try {
                questions = await window.api.quiz.getQuestions(5);
                showQuestion();
            } catch (err) {
                document.getElementById('questionContent').textContent = "Failed to load questions. Check your connection.";
            }
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('questionContent').textContent = q.content;
            document.getElementById('currentIdx').textContent = currentIdx + 1;
            document.getElementById('feedback').style.display = 'none';
        }

        function handleChoice(userSaysScam) {
            const q = questions[currentIdx];
            const isCorrect = userSaysScam === q.is_scam;
            
            if (isCorrect) score++;
            
            // UI Feedback
            const feedback = document.getElementById('feedback');
            const icon = document.getElementById('feedbackIcon');
            const title = document.getElementById('feedbackTitle');
            const explanation = document.getElementById('explanationText');
            const dots = document.getElementById('dots').children;

            feedback.style.display = 'flex';
            feedback.className = `feedback-overlay ${isCorrect ? 'feedback-correct' : 'feedback-wrong'}`;
            icon.textContent = isCorrect ? '✅' : '❌';
            title.textContent = isCorrect ? 'Spot On!' : 'Caught in the Net!';
            explanation.textContent = q.explanation;
            
            dots[currentIdx].className = `dot ${isCorrect ? 'correct' : 'wrong'}`;
            document.getElementById('scoreDisplay').textContent = `Score: ${score}`;
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) {
                showQuestion();
                document.getElementById('dots').children[currentIdx].classList.add('active');
            } else {
                document.getElementById('quizCard').style.display = 'none';
                document.getElementById('finalScore').style.display = 'block';
                document.getElementById('finalScoreVal').textContent = score;
                
                // Award Gamification Points
                if (window.Gamification) {
                    const xp = score * 15;
                    window.Gamification.addXp(xp, `Quiz Score: ${score}/5`);
                }

                // Award XP on backend
                window.api.quiz.submit().catch(console.error);
            }
        }

        function shareResults() {
            const text = `I just scored ${score}/5 on the CyberShield EDU Scam Quiz! 🔒 Can you beat me? #CyberSecurity #SafeSurfing`;
            if (navigator.share) {
                navigator.share({
                    title: 'My CyberShield Score',
                    text: text,
                    url: window.location.origin
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(text);
                alert("Score copied to clipboard! Share it with your friends.");
            }
        }

        document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>

</html>
